<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">MotorSignal video thumbnail</title>
  <desc id="desc">A dark green MotorSignal thumbnail showing a hand landmark constellation and the text Your movement. Your data.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2c25"/>
      <stop offset=".56" stop-color="#173d33"/>
      <stop offset="1" stop-color="#254c40"/>
    </linearGradient>
    <radialGradient id="glow" cx="76%" cy="45%" r="53%">
      <stop offset="0" stop-color="#9ae8ca" stop-opacity=".28"/>
      <stop offset=".55" stop-color="#4fbc91" stop-opacity=".10"/>
      <stop offset="1" stop-color="#163a30" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef765f" stop-opacity="0"/>
      <stop offset=".2" stop-color="#ef765f"/>
      <stop offset=".78" stop-color="#f4a183"/>
      <stop offset="1" stop-color="#ef765f" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#061812" flood-opacity=".4"/></filter>
    <pattern id="dots" width="38" height="38" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.2" fill="#b4e6d1" opacity=".14"/></pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <rect x="950" width="970" height="1080" fill="url(#glow)"/>
  <ellipse cx="1550" cy="500" rx="340" ry="430" fill="#6bd4a8" opacity=".14" filter="url(#soft)"/>
  <path d="M0 845 C200 775 350 930 570 850 S950 760 1130 853 S1490 960 1920 810" fill="none" stroke="url(#wave)" stroke-width="8" opacity=".9"/>
  <path d="M0 882 C215 812 368 968 585 886 S950 795 1135 889 S1492 997 1920 846" fill="none" stroke="#f09a82" stroke-width="2" opacity=".38"/>

