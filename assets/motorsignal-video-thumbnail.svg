      <path d="M328 625 L329 440 L310 245"/><path d="M329 440 L398 390 L392 162"/><path d="M398 390 L466 382 L490 193"/><path d="M466 382 L535 429 L571 252"/><path d="M398 390 L431 505 L492 586"/><path d="M329 440 L374 541 L431 505"/>
