    <text x="48" y="26" fill="#f6faf5" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" letter-spacing="-1">MotorSignal</text>
    <text x="0" y="202" fill="#f8faf6" font-family="Georgia, 'Times New Roman', serif" font-size="124" font-weight="600" letter-spacing="-5">Your movement.</text>
    <text x="0" y="326" fill="#ef765f" font-family="Georgia, 'Times New Roman', serif" font-size="124" font-style="italic" font-weight="600" letter-spacing="-5">Your data.</text>
    <text x="4" y="405" fill="#bed5ca" font-family="Arial, Helvetica, sans-serif" font-size="30" letter-spacing=".2">A private 15-second hand-motion check-in.</text>
