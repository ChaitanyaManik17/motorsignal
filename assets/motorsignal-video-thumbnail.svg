      <circle cx="34" cy="32" r="8" fill="#9cf1c9"/>
      <text x="59" y="41" fill="#eafff2" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600">Raw video stays in your browser</text>
    </g>
  </g>

